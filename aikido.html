<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Esame Aikido - Do Samurai Lucca</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #3498db;
            --listening-color: #2ecc71;
            --waiting-color: #e67e22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Schermata di Selezione */
        #selection-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        /* Schermata del Quiz */
        #quiz-screen {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
            justify-content: space-between;
            position: relative;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-sub);
            margin-bottom: 40px;
        }

        .menu-btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 2px solid #333;
            padding: 20px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 16px;
            margin-bottom: 15px;
            width: 100%;
            max-width: 340px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .menu-btn:active {
            background-color: #252525;
        }

        /* Card Codice/Percorso */
        #card-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        .quiz-card {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 30px 20px;
            width: 100%;
            max-width: 360px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid #2a2a2a;
        }

        .card-type {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-sub);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .card-text {
            font-size: 32px;
            font-weight: 700;
            line-height: 1.3;
            word-wrap: break-word;
        }

        /* Area Stato Inferiore (Solo testo e Feedback) */
        #status-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        #status-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 15px;
            text-align: center;
        }

        /* Pulsante Unico di Controllo */
        #action-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.3);
        }

        #action-btn svg {
            width: 30px;
            height: 30px;
            fill: white;
        }

        /* Pulsante per tornare indietro */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 10px;
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: var(--text-sub);
        }
    </style>
</head>
<body>

    <!-- INTERFACCIA DI SELEZIONE -->
    <div id="selection-screen">
        <h1>Esame Aikido</h1>
        <div class="subtitle">Do Samurai Lucca</div>
        <button class="menu-btn" onclick="startSession('6_kyu')">6° Kyu</button>
        <button class="menu-btn" onclick="startSession('5_kyu')">5° Kyu</button>
        <button class="menu-btn" onclick="startSession('4_kyu')">4° Kyu</button>
    </div>

    <!-- INTERFACCIA QUIZ (STRUTTURA ORIGINALE) -->
    <div id="quiz-screen" class="hidden">
        <button class="back-btn" onclick="goBack()">
            <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
        </button>

        <div id="card-container">
            <!-- La card principale del programma originale -->
            <div class="quiz-card" id="main-card" onclick="handleCardClick()">
                <div class="card-type" id="card-label">Codice</div>
                <div class="card-text" id="card-content">Pronto</div>
            </div>
        </div>

        <div id="status-container">
            <div id="status-text">Tocca la card o il pulsante</div>
            <button id="action-btn" onclick="handleMainAction()">
                <!-- Icona Play/Avanti originale -->
                <svg viewBox="0 0 24 24" id="btn-icon"><path d="M8 5v14l11-7z"/></svg>
            </button>
        </div>
    </div>

    <script>
        // Il tuo database originale delle tecniche
        const database = {
            "6_kyu": [
                { domanda: "Ai Hanmi Katatedori", risposta: "Ikkyo (Omote/Ura)" },
                { domanda: "Ai Hanmi Katatedori", opacity: "Shihonage (Omote/Ura)" },
                { domanda: "Shomenuchi", risposta: "Iriminage" }
            ],
            "5_kyu": [
                { domanda: "Gyaku Hanmi Katatedori", risposta: "Shihonage" },
                { domanda: "Katatedori Ryotedori", risposta: "Kokyunage" },
                { domanda: "Shomenuchi", risposta: "Nikyo" }
            ],
            "4_kyu": [
                { domanda: "Yokomenuchi", risposta: "Shihonage" },
                { domanda: "Chudan Tsuki", risposta: "Kotegaeshi" },
                { domanda: "Ryotedori", risposta: "Tenchinage" }
            ]
        };

        let sessionData = [];
        let currentIndex = 0;
        let isShowingAnswer = false;

        // Funzione nativa per il feedback touch (vibrazione leggera)
        function cellTouchFeedback() {
            if (navigator.vibrate) {
                navigator.vibrate(15); 
            }
        }

        function startSession(level) {
            cellTouchFeedback();
            // Rimescola mantenendo la logica originale
            sessionData = [...database[level]].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            isShowingAnswer = false;

            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            
            showQuestion();
        }

        function showQuestion() {
            isShowingAnswer = false;
            document.getElementById('card-label').innerText = "Attacco / Situazione";
            document.getElementById('card-content').innerText = sessionData[currentIndex].domanda;
            document.getElementById('status-text').innerText = "Visualizzazione Attacco";
            
            // Icona "Mostra Risposta" (Occhio o freccia avanti)
            document.getElementById('btn-icon').innerHTML = '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>';
        }

        function showAnswer() {
            isShowingAnswer = true;
            document.getElementById('card-label').innerText = "Tecnica da eseguire";
            document.getElementById('card-content').innerText = sessionData[currentIndex].risposta;
            document.getElementById('status-text').innerText = "Visualizzazione Risposta";
            
            // Icona "Prossimo" (Freccia avanti originale)
            document.getElementById('btn-icon').innerHTML = '<path d="M5 13h11.86l-5.43 5.43L12.83 20l8-8-8-8-1.41 1.41L16.86 11H5v2z"/>';
        }

        function handleMainAction() {
            cellTouchFeedback();
            if (!isShowingAnswer) {
                showAnswer();
            } else {
                currentIndex++;
                if (currentIndex >= sessionData.length) {
                    // Riparte da capo rimescolando se finiscono le tecniche
                    sessionData.sort(() => Math.random() - 0.5);
                    currentIndex = 0;
                }
                showQuestion();
            }
        }

        function handleCardClick() {
            handleMainAction();
        }

        function goBack() {
            cellTouchFeedback();
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('selection-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
