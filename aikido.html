<html lang="it">

<head>
    <meta charset="UTF-8">

    <title>Esame Aikido - Do Samurai Lucca</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #3498db;
            --listening-color: #2ecc71;
            --waiting-color: #e67e22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Schermata di Selezione */
        #selection-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        h2 {
            font-size: 1rem;
            margin-bottom: 25px;
            color: var(--accent);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-options {
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
        }

        .option-title {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 10px;
            text-align: left;
        }

        .toggle-container {
            display: flex;
            background: #2d2d2d;
            border-radius: 8px;
            padding: 4px;
        }

        .toggle-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-sub);
            padding: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: var(--accent);
            color: white;
        }

        .grid-gradi {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .btn-grado {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 2px solid #2d2d2d;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s;
        }

        .btn-grado:active {
            transform: scale(0.95);
            border-color: var(--accent);
        }

        /* Schermata Allenamento (A tutto schermo) */
        #training-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            position: relative;
            padding: 20px;
            justify-content: space-between;
            transition: border 0.3s ease;
            border: 0px solid transparent;
        }

        /* Stati del feedback visivo tramite bordo */
        #training-screen.listening {
            animation: pulse-border-green 1.5s infinite;
        }

        #training-screen.speaking {
            border: 8px solid var(--waiting-color);
        }

        @keyframes pulse-border-green {
            0% { border: 8px solid rgba(46, 204, 113, 0.4); }
            50% { border: 8px solid rgba(46, 204, 113, 1); }
            100% { border: 8px solid rgba(46, 204, 113, 0.4); }
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .info-esame {
            font-size: 0.9rem;
            color: var(--text-sub);
            background: #2d2d2d;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .btn-esci {
            background: #cc0000;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .contenuto-tecnica {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
            padding: 10px 0;
        }

        .waza {
            font-size: 2.2rem;
            font-weight: 300;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .attacco {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .tecnica {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--text-main);
            text-transform: uppercase;
            line-height: 1.1;
        }

        .bottom-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .status-badge {
            font-size: 0.9rem;
            padding: 6px 16px;
            border-radius: 15px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-badge.ascolto {
            background-color: rgba(46, 204, 113, 0.2);
            color: var(--listening-color);
        }

        .status-badge.parla {
            background-color: rgba(230, 126, 34, 0.2);
            color: var(--waiting-color);
        }

        .hint-touch {
            font-size: 0.85rem;
            color: var(--text-sub);
            animation: pulse-text 2s infinite;
        }

        @keyframes pulse-text {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>

                console.error("Errore Speech Recognition:", event.error);

        function setModalita(mod) {
            modalitaCorrente = mod;
            document.getElementById('btn-seq').classList.toggle('active', mod === 'SEQ');
            document.getElementById('btn-rand').classList.toggle('active', mod === 'RAND');
        }

        function avviaAllenamento(idGrado) {
            gradoAttivo = idGrado;
            const datiGrado = programmaEsami[idGrado];
            // Cloniamo l'array originale
            listaTecnicheSessione = [...datiGrado.tecniche];

            // Se la modalità è Random, mescoliamo l'ordine degli elementi
            if (modalitaCorrente === 'RAND') {
                listaTecnicheSessione.sort(() => Math.random() - 0.5);
            }

            indiceCorrente = 0;
           
            // Cambio Schermata
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('training-screen').style.display = 'flex';

            // Mostra e Parla la prima tecnica
            mostraElementoCorrente();

            // Attivazione del Microfono
            attivaRiconoscimentoVocale();
        }

        function mostraElementoCorrente() {
            if (indiceCorrente >= listaTecnicheSessione.length) {
                fineProgramma();
                return;
            }

            const item = listaTecnicheSessione[indiceCorrente];
            const nomeGradoCompleto = programmaEsami[gradoAttivo].nome;

            // Aggiorna UI
            document.getElementById('info-progresso').innerText = `${nomeGradoCompleto} - ${indiceCorrente + 1}/${listaTecnicheSessione.length}`;
            document.getElementById('display-waza').innerText = item.waza;
            document.getElementById('display-attacco').innerText = item.attacco;
            document.getElementById('display-tecnica').innerText = item.tecnica;

            // Pronuncia Vocale (Text to Speech)
            pronunciaTecnica(item.waza, item.attacco, item.tecnica);
        }

        function pronunciaTecnica(waza, attacco, tecnica) {
            if ('speechSynthesis' in window) {
                // Se stava parlando, interrompi immediatamente
                window.speechSynthesis.cancel();

                // Cambia temporaneamente il feedback visivo sul bordo (Arancione = Sto parlando io)
                attivaVisualeParlata();

                // Costruisci la frase da dire in modo naturale
                const testoDaDire = `${waza}. ${attacco}. ${tecnica}.`;
                const utterance = new SpeechSynthesisUtterance(testoDaDire);
                utterance.lang = 'it-IT';
                utterance.rate = 0.9; // Leggermente più lento per scandire bene i termini giapponesi

                utterance.onend = function() {
                    // Finita la parlata, rimetti il bordo verde pulsante dell'ascolto
                    attivaVisualeAscolto();
                };

                window.speechSynthesis.speak(utterance);
            } else {
                attivaVisualeAscolto();
            }
        }

        function avanzaTecnica() {
            if (bloccoAvanzamento) return;
            bloccoAvanzamento = true;

            indiceCorrente++;
            mostraElementoCorrente();

            // Sblocca dopo un piccolo delay per evitare skip multipli involontari
            setTimeout(() => {
                bloccoAvanzamento = false;
            }, 600);
        }

        function gestisciTouch() {
            // Un tap sullo schermo avanza alla tecnica successiva
            avanzaTecnica();
        }

        function attivaRiconoscimentoVocale() {
            if (recognition) {
                isListening = true;
                try {
                    recognition.start();
                } catch (e) {
                    // Già avviato
                }
            }
        }

        function disattivaRiconoscimentoVocale() {
            isListening = false;
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
        }

        function attivaVisualeParlata() {
            const screen = document.getElementById('training-screen');
            screen.classList.remove('listening');
            screen.classList.add('speaking');
           
            const badge = document.getElementById('status-mic');
            if (recognition) {
                badge.className = "status-badge parla";
                badge.innerHTML = "<span>●</span> ENUNCIAZIONE TECNICA...";
            }
        }

        function attivaVisualeAscolto() {
            const screen = document.getElementById('training-screen');
            screen.classList.remove('speaking');
            screen.classList.add('listening');

            const badge = document.getElementById('status-mic');
            if (recognition) {
                badge.className = "status-badge ascolto";
                badge.innerHTML = "<span>●</span> IN ASCOLTO (Pronuncia 'OK')";
            }
        }

        function disattivaVisualeAscolto() {
            const screen = document.getElementById('training-screen');
            screen.classList.remove('speaking', 'listening');
        }

        function fineProgramma() {
            disattivaRiconoscimentoVocale();
            disattivaVisualeAscolto();
            if ('speechSynthesis' in window) {
                const fineUtterance = new SpeechSynthesisUtterance("Programma completato! Ottimo lavoro.");
                fineUtterance.lang = 'it-IT';
                window.speechSynthesis.speak(fineUtterance);
            }
            alert("Complimenti! Hai completato tutte le tecniche del modulo.");
            tornaAlMenu();
        }

        function uscire(event) {
            // Evita che il click sul bottone Esci attivi anche il touch di sfondo dello schermo intero
            if (event) event.stopPropagation();
            if ('speechSynthesis' in window) window.speechSynthesis.cancel();
            tornaAlMenu();
        }

        function tornaAlMenu() {
            disattivaRiconoscimentoVocale();
            disattivaVisualeAscolto();
            document.getElementById('training-screen').style.display = 'none';
            document.getElementById('selection-screen').style.display = 'flex';
        }
    </script>
</body>
</html>
