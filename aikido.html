<!DOCTYPE html>
<html lang="it">
<html translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Esame Aikido - Dojo Samurai Lucca</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #3498db;
            --correct-color: #2ecc71;
            --wrong-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            color: var(--text-main);
        }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 12px;
            cursor: pointer;
            width: 80%;
            max-width: 300px;
            margin: 10px 0;
            font-weight: bold;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-select {
            background-color: var(--card-bg);
            border: 2px solid var(--accent);
        }

        /* Schermata Quiz */
        #question-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .label {
            font-size: 14px;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .content {
            font-size: 28px;
            font-weight: bold;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #feedback-box {
            font-size: 22px;
            font-weight: bold;
            margin: 15px 0;
            min-height: 30px;
        }

        .correct { color: var(--correct-color); }
        .wrong { color: var(--wrong-color); }

        #score-counter {
            font-size: 16px;
            color: var(--text-sub);
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <!-- SCHERMATA SELEZIONE GRADO -->
    <div id="selection-screen" class="screen">
        <h1>Esame Aikido<br><small style="font-size:14px; color:var(--text-sub);">Do Samurai Lucca</small></h1>
        <p class="label">Seleziona il grado da verificare</p>
        <button class="btn btn-select" onclick="startQuiz('6_kyu')">6° Kyu</button>
        <button class="btn btn-select" onclick="startQuiz('5_kyu')">5° Kyu</button>
        <button class="btn btn-select" onclick="startQuiz('4_kyu')">4° Kyu</button>
    </div>

    <!-- SCHERMATA QUIZ TESTUALE -->
    <div id="quiz-screen" class="screen hidden">
        <div id="question-card">
            <div id="card-label" class="label">Attacco / Tecnica</div>
            <div id="card-content" class="content">---</div>
        </div>

        <div id="feedback-box"></div>

        <button id="main-action-btn" class="btn" onclick="handleMainAction()">Mostra Risposta</button>
        <button class="btn" style="background-color: #e74c3c;" onclick="showCorrect()">Corretta 👍</button>
        <button class="btn" style="background-color: #34495e;" onclick="showWrong()">Errata 👎</button>
       
        <div id="score-counter">Risposte: 0 | Corrette: 0</div>
        <button class="btn btn-select" style="margin-top: 30px; padding: 10px;" onclick="backToMenu()">Torna al Menu</button>
    </div>

    <script>
        // DATABASE TECNICHE (Esempio strutturato, puoi espanderlo come preferisci)
        const database = {
            "6_kyu": [
                { domanda: "Ai Hanmi Katatedori", risposta: "Ikkyo (Omote/Ura)" },
                { domanda: "Ai Hanmi Katatedori", risposta: "Shihonage (Omote/Ura)" },
                { domanda: "Shomenuchi", risposta: "Iriminage" }
            ],
            "5_kyu": [
                { domanda: "Gyaku Hanmi Katatedori", risposta: "Shihonage" },
                { font: "Katatedori Ryotedori", risposta: "Kokyunage" },
                { domanda: "Shomenuchi", risposta: "Nikyo" }
            ],
            "4_kyu": [
                { domanda: "Yokomenuchi", risposta: "Shihonage" },
                { domanda: "Chudan Tsuki", risposta: "Kotegaeshi" },
                { domanda: "Ryotedori", risposta: "Tenchinage" }
            ]
        };

        let currentGrado = [];
        let currentIndex = 0;
        let mostrandoDomanda = true;
       
        let totalQuestions = 0;
        let correctQuestions = 0;

        // Funzione per il feedback Touch (Vibrazione)
        function triggerTouchFeedback(type) {
            if (!navigator.vibrate) return;
           
            if (type === 'click') {
                navigator.vibrate(15); // Un singolo micro-tocco leggero per i pulsanti
            } else if (type === 'success') {
                navigator.vibrate([40, 30, 40]); // Doppio tocco rapido per risposta esatta
            } else if (type === 'error') {
                navigator.vibrate(150); // Un'unica vibrazione più profonda per l'errore
            }
        }

        // Avvia il Quiz
        function startQuiz(grado) {
            triggerTouchFeedback('click');
            // Clona e mescola l'array per non ripetere l'ordine
            currentGrado = [...database[grado]].sort(() => Math.random() - 0.5);
            currentIndex = 0;
            totalQuestions = 0;
            correctQuestions = 0;
           
            document.getElementById('selection-screen').classList.add('hidden');
            document.getElementById('quiz-screen').classList.remove('hidden');
            updateScore();
            presentDomanda();
        }

        // Mostra la Domanda
        function presentDomanda() {
            mostrandoDomanda = true;
            document.getElementById('card-label').innerText = "Attacco / Situazione";
            document.getElementById('card-content').innerText = currentGrado[currentIndex].domanda;
            document.getElementById('feedback-box').className = "";
            document.getElementById('feedback-box').innerText = "";
            document.getElementById('main-action-btn').innerText = "Mostra Risposta";
        }

        // Gestione pulsante principale (Mostra Risposta / Prossima)
        function handleMainAction() {
            triggerTouchFeedback('click');
            if (mostrandoDomanda) {
                // Mostra la risposta
                mostrandoDomanda = false;
                document.getElementById('card-label').innerText = "Tecnica da eseguire";
                document.getElementById('card-content').innerText = currentGrado[currentIndex].risposta;
                document.getElementById('main-action-btn').innerText = "Prossima Tecnica";
            } else {
                // Passa alla prossima domanda
                nextQuestion();
            }
        }

        // Risposta Segnata come Corretta
        function showCorrect() {
            if (mostrandoDomanda) handleMainAction(); // Forza la mostra della risposta se premuto prima
            triggerTouchFeedback('success');
           
            const feedback = document.getElementById('feedback-box');
            feedback.className = "correct";
            feedback.innerText = "Ottimo! Risposta Corretta 👍";
           
            correctQuestions++;
            totalQuestions++;
            updateScore();
        }

        // Risposta Segnata come Errata
        function showWrong() {
            if (mostrandoDomanda) handleMainAction();
            triggerTouchFeedback('error');
           
            const feedback = document.getElementById('feedback-box');
            feedback.className = "wrong";
            feedback.innerText = "Da ripassare! 👎";
           
            totalQuestions++;
            updateScore();
        }

        // Avanzamento alla prossima coppia
        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= currentGrado.length) {
                // Finito il giro, rimescola per continuare all'infinito
                currentGrado.sort(() => Math.random() - 0.5);
                currentIndex = 0;
            }
            presentDomanda();
        }

        // Aggiorna il contatore testuale
        function updateScore() {
            document.getElementById('score-counter').innerText = `Risposte: ${totalQuestions} | Corrette: ${correctQuestions}`;
        }

        // Torna al Menu Principale
        function backToMenu() {
            triggerTouchFeedback('click');
            document.getElementById('quiz-screen').classList.add('hidden');
            document.getElementById('selection-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
