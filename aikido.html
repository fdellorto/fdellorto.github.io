<!DOCTYPE html>
<html lang="it">
<html translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Esame Aikido - Dojo Samurai Lucca</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --accent: #3498db;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Schermata di Selezione */
        #selection-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        h2 {
            font-size: 1rem;
            margin-bottom: 25px;
            color: var(--accent);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-options {
            width: 100%;
            max-width: 400px;
            margin-bottom: 20px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
        }

        .option-title {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 10px;
            text-align: left;
        }

        .toggle-container {
            display: flex;
            background: #2d2d2d;
            border-radius: 8px;
            padding: 4px;
        }

        .toggle-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-sub);
            padding: 10px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .toggle-btn.active {
            background: var(--accent);
            color: white;
        }

        .grid-gradi {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .btn-grado {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 2px solid #2d2d2d;
            padding: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s;
        }

        .btn-grado:active {
            transform: scale(0.95);
            border-color: var(--accent);
        }

        /* Schermata Allenamento */
        #training-screen {
            display: none;
            flex-direction: column;
            height: 100%;
            position: relative;
            padding: 20px;
            justify-content: space-between;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .info-esame {
            font-size: 0.9rem;
            color: var(--text-sub);
            background: #2d2d2d;
            padding: 6px 12px;
            border-radius: 20px;
        }

        .btn-esci {
            background: #cc0000;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .contenuto-tecnica {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
            padding: 10px 0;
        }

        .waza {
            font-size: 2.2rem;
            font-weight: 300;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .attacco {
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .tecnica {
            font-size: 3.5rem;
            font-weight: 900;
            color: var(--text-main);
            text-transform: uppercase;
            line-height: 1.1;
        }

        .bottom-bar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }

        .hint-touch {
            font-size: 0.95rem;
            color: var(--text-sub);
            animation: pulse-text 2s infinite;
        }

        @keyframes pulse-text {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>

        let gradoAttivo = "";
        let bloccoAvanzamento = false; 

        function triggerHaptic() {
            if (navigator.vibrate) {
                navigator.vibrate(15); 
            }
        }

        function setModalita(mod) {
            triggerHaptic();
            modalitaCorrente = mod;
            document.getElementById('btn-seq').classList.toggle('active', mod === 'SEQ');
            document.getElementById('btn-rand').classList.toggle('active', mod === 'RAND');
        }

        function avviaAllenamento(idGrado) {
            triggerHaptic();
            gradoAttivo = idGrado;
            const datiGrado = programmaEsami[idGrado];
            listaTecnicheSessione = [...datiGrado.tecniche];

            if (modalitaCorrente === 'RAND') {
                listaTecnicheSessione.sort(() => Math.random() - 0.5);
            }

            indiceCorrente = 0;
            
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('training-screen').style.display = 'flex';

            mostraElementoCorrente();
        }

        function mostraElementoCorrente() {
            if (indiceCorrente >= listaTecnicheSessione.length) {
                fineProgramma();
                return;
            }

            const item = listaTecnicheSessione[indiceCorrente];
            const nomeGradoCompleto = programmaEsami[gradoAttivo].nome;

            document.getElementById('info-progresso').innerText = `${nomeGradoCompleto} - ${indiceCorrente + 1}/${listaTecnicheSessione.length}`;
            document.getElementById('display-waza').innerText = item.waza;
            document.getElementById('display-attacco').innerText = item.attacco;
            document.getElementById('display-tecnica').innerText = item.tecnica;
        }

        function avanzaTecnica() {
            if (bloccoAvanzamento) return;
            bloccoAvanzamento = true;
            triggerHaptic();

            indiceCorrente++;
            mostraElementoCorrente();

            setTimeout(() => {
                bloccoAvanzamento = false;
            }, 400);
        }

        function gestisciTouch() {
            avanzaTecnica();
        }

        function fineProgramma() {
            alert("Complimenti! Hai completato tutte le tecniche del modulo.");
            tornaAlMenu();
        }

        function uscire(event) {
            if (event) event.stopPropagation(); 
            triggerHaptic();
            tornaAlMenu();
        }

        function tornaAlMenu() {
            document.getElementById('training-screen').style.display = 'none';
            document.getElementById('selection-screen').style.display = 'flex';
        }

</html>
